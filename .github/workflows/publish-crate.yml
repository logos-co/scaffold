name: Publish crate

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to publish (for example X.Y.Z, vX.Y.Z, X.Y.Z-rc.1)"
        required: true
        type: string

permissions:
  contents: read

env:
  CRATE_NAME: logos-scaffold

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      release_channel: ${{ steps.resolve.outputs.release_channel }}
      version_raw: ${{ steps.resolve.outputs.version_raw }}
      version_normalized: ${{ steps.resolve.outputs.version_normalized }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve and validate version
        id: resolve
        env:
          CRATE_NAME: ${{ env.CRATE_NAME }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          release_channel="stable"

          if [[ "$EVENT_NAME" == "push" && "$REF_TYPE" == "tag" ]]; then
            raw_version="$REF_NAME"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            raw_version="$INPUT_VERSION"
          elif [[ "$EVENT_NAME" == "push" && "$REF_TYPE" == "branch" && "$REF_NAME" == "master" ]]; then
            release_channel="rc"
            manifest_version="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)"

            if [[ ! "$manifest_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "::error::Automatic RC publishes require Cargo.toml to contain a stable X.Y.Z package version. Found '$manifest_version'."
              exit 1
            fi

            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            candidate_base="$manifest_version"

            url="https://crates.io/api/v1/crates/${CRATE_NAME}/${manifest_version}"
            status_code="$(curl -sS -o /dev/null -w '%{http_code}' -H 'User-Agent: logos-scaffold-ci (https://github.com/logos-co/scaffold)' "$url")"

            if [[ "$status_code" == "200" ]]; then
              candidate_base="${major}.${minor}.$((patch + 1))"
            elif [[ "$status_code" != "404" ]]; then
              echo "::error::Unexpected crates.io response status while checking base version: ${status_code}"
              exit 1
            fi

            raw_version="${candidate_base}-rc.${RUN_NUMBER}.${RUN_ATTEMPT}"
          else
            echo "::error::Unsupported publish event: event=${EVENT_NAME}, ref_type=${REF_TYPE}, ref_name=${REF_NAME}."
            exit 1
          fi

          normalized_version="${raw_version#v}"
          semver_pattern='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "$normalized_version" =~ $semver_pattern ]]; then
            echo "::error::Invalid version '$raw_version'. Expected semver (for example X.Y.Z, vX.Y.Z, X.Y.Z-rc.1)."
            exit 1
          fi

          echo "release_channel=$release_channel" >> "$GITHUB_OUTPUT"
          echo "version_raw=$raw_version" >> "$GITHUB_OUTPUT"
          echo "version_normalized=$normalized_version" >> "$GITHUB_OUTPUT"

  verify:
    runs-on: ubuntu-latest
    needs: resolve-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Apply release candidate version
        if: needs.resolve-version.outputs.release_channel == 'rc'
        env:
          RELEASE_VERSION: ${{ needs.resolve-version.outputs.version_normalized }}
        run: |
          set -euo pipefail

          perl -0pi -e 's/^version = "[^"]+"/version = "$ENV{RELEASE_VERSION}"/m' Cargo.toml
          cargo generate-lockfile

      - name: Confirm resolved version
        run: |
          echo "Release channel: ${{ needs.resolve-version.outputs.release_channel }}"
          echo "Raw version: ${{ needs.resolve-version.outputs.version_raw }}"
          echo "Normalized version: ${{ needs.resolve-version.outputs.version_normalized }}"

      - name: Check formatting
        run: cargo fmt --check

      - name: Build check
        run: cargo check --locked

      - name: Run tests
        run: cargo test --locked

      - name: Dry-run publish package
        run: cargo publish --dry-run --locked

  publish:
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - verify
    concurrency:
      group: ${{ github.workflow }}-${{ needs.resolve-version.outputs.version_normalized }}
      cancel-in-progress: false
    outputs:
      publish_status: ${{ steps.summary.outputs.publish_status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Apply release candidate version
        if: needs.resolve-version.outputs.release_channel == 'rc'
        env:
          RELEASE_VERSION: ${{ needs.resolve-version.outputs.version_normalized }}
        run: |
          set -euo pipefail

          perl -0pi -e 's/^version = "[^"]+"/version = "$ENV{RELEASE_VERSION}"/m' Cargo.toml
          cargo generate-lockfile

      - name: Validate Cargo.toml version matches release version
        env:
          RELEASE_VERSION: ${{ needs.resolve-version.outputs.version_normalized }}
        run: |
          set -euo pipefail

          manifest_version="$(cargo pkgid --quiet | sed 's/.*#//; s/.*@//')"

          if [[ -z "$manifest_version" ]]; then
            echo "::error::Could not resolve crate version from Cargo.toml."
            exit 1
          fi

          if [[ "$manifest_version" != "$RELEASE_VERSION" ]]; then
            echo "::error::Version mismatch. Cargo.toml has '$manifest_version' but release version is '$RELEASE_VERSION'."
            exit 1
          fi

      - name: Check whether version already exists on crates.io
        id: crates-io
        env:
          RELEASE_VERSION: ${{ needs.resolve-version.outputs.version_normalized }}
        run: |
          set -euo pipefail

          url="https://crates.io/api/v1/crates/${CRATE_NAME}/${RELEASE_VERSION}"
          status_code="$(curl -sS -o /dev/null -w '%{http_code}' -H 'User-Agent: logos-scaffold-ci (https://github.com/logos-co/logos-scaffold)' "$url")"

          if [[ "$status_code" == "200" ]]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${RELEASE_VERSION} is already published on crates.io. Skipping publish."
          elif [[ "$status_code" == "404" ]]; then
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${RELEASE_VERSION} is not published yet. Publishing now."
          else
            echo "::error::Unexpected crates.io response status: ${status_code}"
            exit 1
          fi

      - name: Publish crate
        if: steps.crates-io.outputs.already_published == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${CARGO_REGISTRY_TOKEN}" ]]; then
            echo "::error::Missing CARGO_REGISTRY_TOKEN secret."
            exit 1
          fi

          cargo publish --locked

      - name: Publish summary
        id: summary
        env:
          RELEASE_VERSION: ${{ needs.resolve-version.outputs.version_normalized }}
          ALREADY_PUBLISHED: ${{ steps.crates-io.outputs.already_published }}
        run: |
          set -euo pipefail

          status="published"
          if [[ "$ALREADY_PUBLISHED" == "true" ]]; then
            status="skipped-already-published"
          fi

          echo "publish_status=$status" >> "$GITHUB_OUTPUT"

          {
            echo "### crates.io publish summary"
            echo "- crate: ${CRATE_NAME}"
            echo "- version: ${RELEASE_VERSION}"
            echo "- status: ${status}"
          } >> "$GITHUB_STEP_SUMMARY"
